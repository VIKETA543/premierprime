<div class="card flex justify-center  container">
    <p-panel header="USER ACCESS CONTROL">
        <span>Enter user access key</span>

        <p-password [(ngModel)]="RedirectKey" [toggleMask]="true" autocomplete="off" [feedback]="false"
            [style]="{'width': '100%'}" [inputStyle]="{'width': '100%'}"></p-password>

        <p-divider></p-divider>
        <div class="card flex justify-center">
            <p-button label="Submit" severity="contrast"  (onClick)="authUser()" />
        </div>
        @if(message){
        <div class="card">
            <p-message severity="error">{{message}}</p-message>
        </div>
        }
        @if(success){
        <div class="card">
            <p-message severity="success">{{success}}</p-message>
        </div>
        }
    </p-panel>
</div>
